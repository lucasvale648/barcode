<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="description" content="Scanner de código de barras para produtos de limpeza" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scanner" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <title>Scanner de Produtos</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ── -->
  <header>
    <h1>
      Scanner
      <span class="subtitle"> · Produtos de limpeza</span>
    </h1>
  </header>

  <!-- ── Main ── -->
  <div class="main-content">

    <!-- Página: Scanner -->
    <div id="page-scan" class="page active">

      <!-- Câmera -->
      <div id="camera-wrap" class="camera-wrap">
        <video id="video" playsinline muted autoplay></video>

        <div id="camera-placeholder" class="camera-placeholder">
          <svg viewBox="0 0 24 24">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Câmera desativada
        </div>

        <div id="scan-overlay" class="scan-overlay">
          <div class="scan-frame">
            <div class="corner-bl"></div>
            <div class="corner-br"></div>
            <div class="scan-line"></div>
          </div>
        </div>

        <div id="cam-status" class="cam-status-bar" style="display:none">
          Buscando código de barras...
        </div>
      </div>

      <!-- Botões câmera -->
      <div class="btn-row">
        <button id="btn-start" class="btn btn-primary">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Ativar câmera
        </button>
        <button id="btn-stop" class="btn btn-outline" style="display:none">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          Parar
        </button>
      </div>

      <!-- Busca manual -->
      <div class="input-row">
        <input
          id="manual-input"
          type="text"
          inputmode="numeric"
          placeholder="Ou digite o código de barras..."
          maxlength="14"
          autocomplete="off"
        />
        <button id="btn-search" class="btn btn-outline" style="width:auto">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <!-- Resultado -->
      <div id="result-wrap" class="result-wrap"></div>

    </div>

    <!-- Página: Histórico -->
    <div id="page-history" class="page">
      <div class="section-title">Histórico de scans</div>

      <div id="history-empty" class="history-empty">
        <div class="icon">📋</div>
        Nenhum produto escaneado ainda.
      </div>

      <div id="history-list" class="history-list"></div>

      <button id="btn-clear-history" class="clear-btn" style="display:none">
        Limpar histórico
      </button>
    </div>

  </div>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav">
    <button id="nav-scan" class="nav-btn active">
      <svg viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Scanner
    </button>
    <button id="nav-history" class="nav-btn">
      <svg viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Histórico
    </button>
  </nav>

</div>

<!-- Banner de instalação PWA -->
<div id="install-banner">
  <div class="text">
    <strong>Instalar app</strong>
    Adicione à tela inicial
  </div>
  <button id="install-btn">Instalar</button>
  <button id="close-banner" class="close-banner">✕</button>
</div>

<!-- Canvas oculto usado pelo ZXing como fallback (não renderiza na tela) -->
<canvas id="scan-canvas" style="display:none"></canvas>

<!-- ZXing é carregado sob demanda pelo app.js somente se BarcodeDetector não estiver disponível -->
<script src="/app.js"></script>

</body>
</html>
